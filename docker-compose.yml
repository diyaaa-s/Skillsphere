version: '3.8'

services:
  # ===== Node.js App =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: skillsphere_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/skillsphere
      - JWT_SECRET=skillsphere_super_secret_jwt_key_2024_change_in_production
      - JWT_EXPIRES=7d
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - skillsphere_net
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===== MongoDB =====
  mongo:
    image: mongo:7.0
    container_name: skillsphere_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=skillsphere
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - skillsphere_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/skillsphere --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: skillsphere_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - skillsphere_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ===== Networks =====
networks:
  skillsphere_net:
    driver: bridge
    name: skillsphere_network

# ===== Volumes =====
volumes:
  mongo_data:
    driver: local
    name: skillsphere_mongo_data
