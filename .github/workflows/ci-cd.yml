name: SkillSphere CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ===== JOB 1: Test & Lint =====
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Syntax check
        run: |
          echo "Running syntax checks..."
          node --check backend/server.js
          node --check backend/routes/auth.js
          node --check backend/routes/skills.js
          node --check backend/routes/users.js
          node --check backend/models/User.js
          node --check backend/models/Skill.js
          echo "✅ All syntax checks passed!"

      - name: 🏥 API health check
        env:
          MONGO_URI: mongodb://localhost:27017/skillsphere_test
          JWT_SECRET: test_secret_key
          PORT: 5001
          NODE_ENV: test
        run: |
          node backend/server.js &
          SERVER_PID=$!
          sleep 8
          curl -f http://localhost:5001/api/health && echo "✅ Health check passed!"
          kill $SERVER_PID || true

  # ===== JOB 2: Docker Build & Push =====
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME || 'local' }}/skillsphere:latest
            ${{ secrets.DOCKER_HUB_USERNAME || 'local' }}/skillsphere:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ secrets.DOCKER_HUB_USERNAME == '' }}

      - name: ✅ Docker build complete
        run: echo "🐳 Docker image built successfully!"

  # ===== JOB 3: Deploy to GitHub Pages =====
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload frontend to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment complete
        run: |
          echo "🌐 SkillSphere is LIVE at: ${{ steps.deployment.outputs.page_url }}"
          echo "✅ All pages deployed successfully!"

  # ===== JOB 4: Security Scan =====
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 npm audit
        run: npm audit --audit-level=high || echo "⚠️ Review vulnerabilities before production"

      - name: 🐳 Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
