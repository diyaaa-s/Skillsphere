name: SkillSphere — Deploy Frontend to GitHub Pages + Docker Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ===== JOB 1: Build Frontend for GitHub Pages =====
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📁 Prepare frontend (copy from /frontend to root build)
        run: |
          mkdir -p ./_site
          cp -r frontend/* ./_site/
          echo "✅ Frontend files ready:"
          ls -la ./_site/
      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ===== JOB 2: Deploy Frontend to GitHub Pages =====
  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: ✅ Live URL
        run: echo "🌐 SkillSphere is live at ${{ steps.deployment.outputs.page_url }}"

  # ===== JOB 3: Build & Push Docker Image (Backend) =====
  docker:
    name: 🐳 Docker Build & Push Backend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏗️ Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/skillsphere:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/skillsphere:${{ github.sha }}