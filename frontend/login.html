<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SkillSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .auth-page { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 6rem 1.5rem 3rem; position:relative; overflow:hidden; }
    .auth-page .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:.18; pointer-events:none; }
    .auth-page .orb--1 { width:500px;height:500px;background:var(--accent);top:-150px;left:-150px; }
    .auth-page .orb--2 { width:400px;height:400px;background:var(--accent-2);bottom:-100px;right:-100px; }
    .auth-box { background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:2.5rem; width:100%; max-width:440px; position:relative; z-index:2; box-shadow:var(--shadow); animation: fadeUp .5s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo { display:flex;align-items:center;gap:.5rem;font-family:var(--font-head);font-size:1.3rem;font-weight:800;margin-bottom:2rem; }
    .auth-box h1 { font-family:var(--font-head);font-size:1.9rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.4rem; }
    .auth-box .subtitle { color:var(--text-muted);margin-bottom:2rem; }
    .divider { text-align:center;color:var(--text-muted);font-size:.85rem;margin:1.2rem 0;position:relative; }
    .divider::before,.divider::after { content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border); }
    .divider::before{left:0} .divider::after{right:0}
    .auth-switch { text-align:center;font-size:.88rem;color:var(--text-muted);margin-top:1.2rem; }
    .auth-switch a { color:var(--accent);font-weight:500; }
    .forgot { text-align:right;font-size:.82rem;color:var(--accent);margin-top:-.4rem;margin-bottom:.8rem;display:block; }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<section class="auth-page">
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>

  <div class="auth-box">
    <div class="auth-logo"><span class="logo-icon">◎</span> SkillSphere</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to continue exchanging skills</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <a href="#" class="forgot">Forgot password?</a>

    <div id="errorMsg" class="form-error"></div>

    <button class="btn btn--primary btn--full" id="loginBtn" onclick="handleLogin()">
      Log In →
    </button>

    <p class="auth-switch">Don't have an account? <a href="register.html">Sign up free</a></p>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/components.js"></script>
<script>
  Components.init();

  // Redirect if already logged in
  if (Auth.getToken()) window.location.href = 'dashboard.html';

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('errorMsg');
    const btn      = document.getElementById('loginBtn');
    errorEl.textContent = '';

    if (!email || !password) { errorEl.textContent = 'Please fill in all fields.'; return; }
    if (!isValidEmail(email)) { errorEl.textContent = 'Enter a valid email address.'; return; }

    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
      const data = await API.post('/auth/login', { email, password });
      Auth.save(data.token, data.user);
      showToast('Welcome back, ' + data.user.firstName + '! 👋', 'success');
      const params = new URLSearchParams(window.location.search);
      setTimeout(() => { window.location.href = params.get('redirect') || 'dashboard.html'; }, 800);
    } catch(err) {
      errorEl.textContent = err.message;
      btn.textContent = 'Log In →';
      btn.disabled = false;
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
