<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — SkillSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .profile-page { padding:7rem 0 4rem; }
    .profile-layout { display:grid;grid-template-columns:320px 1fr;gap:2rem; }
    .profile-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;position:sticky;top:90px;height:fit-content; }
    .big-avatar { width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:2.2rem;font-weight:800;color:#fff;margin:0 auto 1.2rem;box-shadow:0 0 30px rgba(0,229,255,.3); }
    .profile-card__name { font-family:var(--font-head);font-size:1.4rem;font-weight:800;margin-bottom:.3rem; }
    .profile-card__email { font-size:.85rem;color:var(--text-muted);margin-bottom:1.2rem; }
    .profile-stat-row { display:flex;justify-content:center;gap:1.5rem;padding:1rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:1.2rem; }
    .pstat { text-align:center; }
    .pstat__num { font-family:var(--font-head);font-size:1.3rem;font-weight:800;color:var(--accent); }
    .pstat__label { font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em; }
    .info-row { display:flex;align-items:center;gap:.75rem;font-size:.88rem;padding:.5rem 0;color:var(--text-muted);text-align:left; }
    .info-row span:first-child { font-size:1rem;width:20px;text-align:center; }
    .edit-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.8rem;margin-bottom:1.5rem; }
    .edit-card h3 { font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:1.3rem;display:flex;align-items:center;justify-content:space-between; }
    .save-row { display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.2rem; }
    @media(max-width:800px){.profile-layout{grid-template-columns:1fr}.profile-card{position:static}}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<section class="profile-page">
  <div class="container">
    <div style="margin-bottom:2rem">
      <div class="section-tag">Account</div>
      <h1 style="font-family:var(--font-head);font-size:2rem;font-weight:800;letter-spacing:-.02em">My <span class="gradient-text">Profile</span></h1>
    </div>

    <div class="profile-layout">
      <!-- Profile Summary Card -->
      <div class="profile-card">
        <div class="big-avatar" id="bigAvatar">?</div>
        <div class="profile-card__name" id="cardName">—</div>
        <div class="profile-card__email" id="cardEmail">—</div>
        <div class="profile-stat-row">
          <div class="pstat"><div class="pstat__num" id="cardExchanges">0</div><div class="pstat__label">Exchanges</div></div>
          <div class="pstat"><div class="pstat__num" id="cardRating">—</div><div class="pstat__label">Rating</div></div>
        </div>
        <div id="cardInfoRows"></div>
        <button class="btn btn--ghost btn--full" style="margin-top:1.2rem;justify-content:center" onclick="Auth.logout()">🚪 Log Out</button>
      </div>

      <!-- Edit Forms -->
      <div>
        <!-- Personal Info -->
        <div class="edit-card">
          <h3>Personal Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="editFirstName"/>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="editLastName"/>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="editEmail" disabled style="opacity:.5;cursor:not-allowed"/>
          </div>
          <div class="form-group">
            <label>Location <span style="color:var(--text-muted);font-size:.82rem">(optional)</span></label>
            <input type="text" id="editLocation" placeholder="e.g. Bangalore, India"/>
          </div>
          <div class="form-group">
            <label>Short Bio</label>
            <textarea id="editBio" placeholder="Tell others about yourself, your experience, and teaching style..."></textarea>
          </div>
          <div id="personalError" class="form-error"></div>
          <div id="personalSuccess" class="form-success"></div>
          <div class="save-row">
            <button class="btn btn--primary" onclick="savePersonal()">Save Changes</button>
          </div>
        </div>

        <!-- Skill Info -->
        <div class="edit-card">
          <h3>Skill Information</h3>
          <div class="form-group">
            <label>I can teach...</label>
            <input type="text" id="editTeach" placeholder="e.g. Python, Guitar, Yoga..."/>
          </div>
          <div class="form-group">
            <label>I want to learn...</label>
            <input type="text" id="editLearn" placeholder="e.g. Spanish, Design, Finance..."/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="editCategory">
                <option value="tech">💻 Technology</option>
                <option value="creative">🎨 Creative Arts</option>
                <option value="music">🎵 Music</option>
                <option value="language">🌍 Languages</option>
                <option value="fitness">💪 Fitness</option>
                <option value="business">📊 Business</option>
                <option value="other">🔖 Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Experience Level</label>
              <select id="editLevel">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
                <option value="Expert">Expert</option>
              </select>
            </div>
          </div>
          <div id="skillError" class="form-error"></div>
          <div id="skillSuccess" class="form-success"></div>
          <div class="save-row">
            <button class="btn btn--primary" onclick="saveSkills()">Save Changes</button>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="edit-card" style="border-color:rgba(239,68,68,.2)">
          <h3 style="color:var(--red)">⚠️ Account Actions</h3>
          <p style="font-size:.9rem;color:var(--text-muted);margin-bottom:1.2rem">These actions cannot be undone. Please be careful.</p>
          <button class="btn btn--ghost" onclick="Auth.logout()" style="border-color:rgba(239,68,68,.3);color:var(--red)">Log Out of SkillSphere</button>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="js/components.js"></script>
<script>
  Components.init();
  if (!Auth.requireAuth()) {}

  const user = Auth.getUser();

  function populatePage() {
    if (!user) return;
    document.getElementById('bigAvatar').textContent    = (user.firstName[0] + user.lastName[0]).toUpperCase();
    document.getElementById('cardName').textContent     = user.firstName + ' ' + user.lastName;
    document.getElementById('cardEmail').textContent    = user.email;
    document.getElementById('cardExchanges').textContent= user.exchanges || 0;
    document.getElementById('cardRating').textContent   = user.rating ? user.rating.toFixed(1) : '—';
    document.getElementById('cardInfoRows').innerHTML   = `
      <div class="info-row"><span>📚</span><span>Teaches: <strong>${user.teach || '—'}</strong></span></div>
      <div class="info-row"><span>🎯</span><span>Wants: <strong>${user.learn || '—'}</strong></span></div>
      ${user.location ? `<div class="info-row"><span>📍</span><span>${user.location}</span></div>` : ''}
    `;
    // Fill form fields
    document.getElementById('editFirstName').value = user.firstName || '';
    document.getElementById('editLastName').value  = user.lastName  || '';
    document.getElementById('editEmail').value     = user.email     || '';
    document.getElementById('editBio').value       = user.bio       || '';
    document.getElementById('editLocation').value  = user.location  || '';
    document.getElementById('editTeach').value     = user.teach     || '';
    document.getElementById('editLearn').value     = user.learn     || '';
    if (user.category) document.getElementById('editCategory').value = user.category;
    if (user.level)    document.getElementById('editLevel').value    = user.level;
  }

  populatePage();

  async function savePersonal() {
    const errEl  = document.getElementById('personalError');
    const succEl = document.getElementById('personalSuccess');
    errEl.textContent = ''; succEl.textContent = '';
    const body = {
      firstName: document.getElementById('editFirstName').value.trim(),
      lastName:  document.getElementById('editLastName').value.trim(),
      bio:       document.getElementById('editBio').value.trim(),
      location:  document.getElementById('editLocation').value.trim(),
    };
    if (!body.firstName || !body.lastName) { errEl.textContent = 'Name fields are required.'; return; }
    try {
      const data = await API.put('/auth/me', body);
      Auth.save(Auth.getToken(), { ...user, ...body });
      succEl.textContent = '✅ Profile updated!';
      populatePage();
    } catch(e) {
      // Demo mode
      Auth.save(Auth.getToken(), { ...user, ...body });
      succEl.textContent = '✅ Profile updated! (Demo mode)';
    }
  }

  async function saveSkills() {
    const errEl  = document.getElementById('skillError');
    const succEl = document.getElementById('skillSuccess');
    errEl.textContent = ''; succEl.textContent = '';
    const body = {
      teach:    document.getElementById('editTeach').value.trim(),
      learn:    document.getElementById('editLearn').value.trim(),
      category: document.getElementById('editCategory').value,
      level:    document.getElementById('editLevel').value,
    };
    if (!body.teach || !body.learn) { errEl.textContent = 'Please fill in both skill fields.'; return; }
    try {
      await API.put('/auth/me', body);
    } catch(e) { /* demo */ }
    Auth.save(Auth.getToken(), { ...user, ...body });
    succEl.textContent = '✅ Skill info updated!';
    populatePage();
  }
</script>
</body>
</html>
